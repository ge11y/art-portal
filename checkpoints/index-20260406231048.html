<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG BE — Art</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Landing overlay */
    /* ============================================================
       LANDING OVERLAY
       ============================================================ */
    #landing {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    /* OGBE title */
    #landing-title {
      font-family: var(--font2);
      font-size: clamp(48px, 10vw, 120px);
      letter-spacing: 0.3em;
      color: #fff;
      margin-bottom: 36px;
      text-transform: uppercase;
      user-select: none;
      position: relative;
      z-index: 2;
      transition: opacity 0.3s;
    }
    #landing.animating #landing-title {
      opacity: 0;
    }

    /* Clickable GIF container */
    #landing-gif-wrap {
      width: min(480px, 90vw);
      aspect-ratio: 1/1;
      cursor: pointer;
      position: relative;
      z-index: 2;
      border: 2px solid rgba(255,255,255,0.6);
      outline: 3px solid rgba(255,255,255,0.3);
      outline-offset: 4px;
    }
    #landing-gif-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Zoom-to-center overlay that expands from the GIF outward */
    #landing-zoom {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 10000;
      background: #000;
      transform: scale(0);
      transform-origin: center center;
      pointer-events: none;
    }

    /* "press" hint */
    #landing-hint {
      margin-top: 28px;
      font-family: var(--font2);
      font-size: 10px;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      user-select: none;
      position: relative;
      z-index: 2;
      transition: opacity 0.3s;
    }
    #landing.animating #landing-hint {
      opacity: 0;
    }

    /* Prevent body scroll while landing shown */
    body.landing-open { overflow: hidden; }

    /* Gallery wrapper */
    #main-wrapper { display: none; }
  </style>
</head>
<body class="landing-open">

  <!-- BACKGROUND MUSIC -->
  <audio id="bg-music" src="audio/OGBE-Be-free.mp3" loop preload="auto"></audio>
  <script>
    var bgMusic = document.getElementById('bg-music');

    function fadeVolume(targetVol, duration) {
      if (!bgMusic) return;
      var startVol = bgMusic.volume || 0;
      var diff = targetVol - startVol;
      var stepTime = duration / 20;
      var stepVol = diff / 20;
      var current = 0;
      var volFade = setInterval(function() {
        current++;
        bgMusic.volume = Math.max(0, Math.min(startVol + stepVol * current, targetVol));
        if (current >= 20) clearInterval(volFade);
      }, stepTime);
    }

    function fadeInMusic(targetVol, duration) {
      if (!bgMusic) return;
      if (bgMusic.paused) bgMusic.play().catch(function() {});
      // Start from near-silence so the song's own intro is softened
      bgMusic.volume = 0.001;
      var startVol = 0.001;
      var diff = targetVol - startVol;
      var steps = 60;
      var stepTime = duration / steps;
      var current = 0;
      var fade = setInterval(function() {
        current++;
        var t = current / steps;
        // Soft S-curve: gentle at start and end
        var curve = t < 0.5
          ? 2 * t * t
          : 1 - Math.pow(-2 * t + 2, 2) / 2;
        bgMusic.volume = Math.max(0, Math.min(startVol + diff * curve, targetVol));
        if (current >= steps) clearInterval(fade);
      }, stepTime);
    }

    // Music starts on user enter — not on landing page
    // Auto-enter after 3.5s on landing
    function startLandingTimer() {
      console.log('startLandingTimer called, entered:', entered);
      if (entered) return;
      if (landingTimer) clearTimeout(landingTimer);
      landingTimer = setTimeout(function() {
        console.log('setTimeout fired! entered:', entered);
        if (!entered) {
          entered = true;
          enterSite();
        }
      }, 3500);
    }
  </script>

function renderArtThumbs(col) {
  // Banner collections: show art array images (the actual banner) as a single full-width card
  if (col.type === 'banner' && col.art && col.art.length > 0) {
    return '<div class="art-thumb art-thumb-banner"><img src="' + col.art[0] + '" alt="" loading="lazy" /></div>';
  }

  // Non-banner collections: show first 4 pieces in a 2x2 grid
  if (col.pieces && col.pieces.length > 0) {
    var displayPieces = col.pieces.slice(0, 4);
    return displayPieces.map(function(p) {
      var imgUrl = 'https://ordinals.com/content/' + p.id;
      return '<div class="art-thumb"><img src="' + imgUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.art-thumb-placeholder\')&&(this.parentElement.querySelector(\'.art-thumb-placeholder\').style.display=\'flex\')" /><div class="art-thumb-placeholder" style="display:none">OG BE</div></div>';
    }).join('');
  }

  // Fallback: collection name
  return '<div class="art-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--panel);"><span style="font-size:11px;color:var(--text-muted);letter-spacing:0.2em;text-transform:uppercase;">' + col.name + '</span></div>';
}

function renderHome() {
  var collectionsHtml = COLLECTIONS.map(function(col) {
    var tags = col.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
    return ''
      + '<a href="#" class="collection-card' + (col.type ? ' collection-card-' + col.type : '') + '" onclick="showCollection(\'' + col.id + '\'); return false;">'
      + '<div class="collection-card-art">' + renderArtThumbs(col) + '</div>'
      + '<div class="collection-card-info">'
      + '<div class="collection-card-name">' + col.name + '</div>'
      + '<div class="collection-card-meta"><span>' + col.count + ' pieces</span></div>'
      + '<div class="collection-card-desc">' + col.descShort + '</div>'
      + '</div>'
      + '<div class="collection-card-arrow">&#x2192;</div>'
      + '</a>';
  }).join('');

  return ''
    + '<div class="section"><div class="container">'
    + '<div class="section-header">'
    + '<h2 class="section-title">Collections</h2>'
    + '</div>'
    + '<div class="collections-grid">'
    + collectionsHtml
    + '</div>'
    + '</div></div>';
}

function renderCollection(colId) {
  var col = COLLECTIONS.find(function(c) { return c.id === colId; });
  if (!col) return '<p>Collection not found.</p>';

  var tags = col.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
  var artHtml = '';
  if (col.art && col.art.length > 0) {
    artHtml = '<div class="collection-art">' + col.art.map(function(url) {
      return '<div class="art-piece-banner" onclick="openBannerViewer(\'' + col.id + '\')"><img src="' + url + '" alt="" loading="lazy" style="width:100%;height:auto;display:block;cursor:pointer;" /></div>';
    }).join('') + '</div>';
  }

  var piecesHtml = col.pieces.map(function(p) {
    var imgUrl = 'https://ordinals.com/content/' + p.id;
    var satHtml = p.sat ? '<div class="piece-card-sat">Sat: ' + p.sat + '</div>' : '';
    var isEegun = col.id === 'eegun';
    var tooltipHtml = isEegun
      ? '<div class="piece-tooltip" id="tip-' + p.id.replace(/[^a-z0-9]/gi, '') + '">'
        + '<a href="https://www.satflow.com/ordinals/eegunbased" target="_blank" rel="noopener">SatFlow</a>'
        + '<a href="https://ord-dropz.xyz/secondary/collections/eegun" target="_blank" rel="noopener">Ord Dropz</a>'
        + '</div>'
      : '';
    return ''
      + '<div class="piece-card">'
      + '<div class="piece-card-img"><img src="' + imgUrl + '" alt="' + p.name + '" loading="lazy" onclick="openPieceViewer(\'' + col.id + '\', \'' + p.id + '\')" onerror="this.parentElement.innerHTML=\'<div class=piece-card-placeholder>OG BE</div>\'" /></div>'
      + '<div class="piece-card-info">'
      + '<div class="piece-card-name">' + p.name + '</div>'
      + '<div class="piece-card-id' + (isEegun ? ' ins-glow' : '') + '" ' + (isEegun ? 'onclick="toggleTip(\'' + p.id.replace(/[^a-z0-9]/gi, '') + '\')"' : '') + '>' + p.id.substring(0, 12) + '...</div>'
      + satHtml
      + '</div>'
      + tooltipHtml
      + '</div>';
  }).join('');

  return ''
    + '<div class="section"><div class="container">'
    + '<div class="back-link"><a href="#" onclick="showHome(); return false;">&#x2190; Collections</a></div>'
    + '<div class="collection-header">'
    + '<div>'
    + '<h1 class="collection-title">' + col.name + '</h1>'
    + '<div class="collection-meta">' + col.count + ' pieces &middot; ' + tags + '</div>'
    + '</div>'
    + '</div>'
    + '<p class="collection-desc">' + col.desc + '</p>'
    + artHtml
    + '<div class="pieces-grid">'
    + piecesHtml
    + '</div>'
    + '</div></div>';
}

function showHome() {
  var main = document.getElementById('mainContent');
  if (!main) return;
  main.classList.add('fade-out');
  setTimeout(function() {
    main.innerHTML = renderHome();
    main.classList.remove('fade-out');
    var navCollections = document.getElementById('navCollections');
    var navOgbe = document.getElementById('navOgbe');
    var navContact = document.getElementById('navContact');
    if (navCollections) navCollections.classList.add('active');
    if (navOgbe) navOgbe.classList.remove('active');
    if (navContact) navContact.classList.remove('active');
    window.scrollTo(0, 0);
  }, 250);
}

function showOgbe() {
  var main = document.getElementById('mainContent');
  if (!main) return;
  main.classList.add('fade-out');

    main.innerHTML = renderOgbeBio();

    if (navOgbe) navOgbe.classList.add('active');

  }, 250);

function toggleNav() {
  document.getElementById('siteNav').classList.toggle('open');
}

function openBannerViewer(colId) {
  var col = COLLECTIONS.find(function(c) { return c.id === colId; });
  if (!col || !col.art || col.art.length === 0) return;
  var imgUrl = col.art[0];
  var artId = imgUrl.replace('https://ordinals.com/content/', '');
  document.getElementById('modalContent').innerHTML =
    '<img src="' + imgUrl + '" alt="Banner" />' +
    '<div class="modal-piece-info">' +
      '<div class="modal-piece-name">' + col.name + '</div>' +
      '<div style="margin-top:8px;color:var(--text-muted);font-size:10px;">ID: ' + artId + '</div>' +
    '</div>';
  document.getElementById('pieceModal').classList.add('open');
}

function openPieceViewer(colId, pieceId) {
  var col = COLLECTIONS.find(function(c) { return c.id === colId; });
  var piece = col ? col.pieces.find(function(p) { return p.id === pieceId; }) : null;
  if (!piece) return;
  var imgUrl;
  if (col && col.type === 'banner' && col.art && col.art.length > 0) {
    var idx = col.pieces.findIndex(function(p) { return p.id === pieceId; });
    imgUrl = col.art[idx] || col.art[0];
  } else {
    imgUrl = 'https://ordinals.com/content/' + piece.id;
  }
  var isEegun = colId === 'eegun';
  var tooltipHtml = isEegun
    ? '<div class="modal-tip" id="modal-tip">'
        + '<a href="https://www.satflow.com/ordinals/eegunbased" target="_blank" rel="noopener">SatFlow</a>'
        + '<a href="https://ord-dropz.xyz/secondary/collections/eegun" target="_blank" rel="noopener">Ord Dropz</a>'
      + '</div>'
    : '';
  var idHtml = isEegun
    ? '<div class="modal-id-wrap">'
        + '<span class="modal-piece-id ins-glow" onclick="toggleModalTip()">' + piece.id + '</span>'
        + tooltipHtml
      + '</div>'
    : '<div class="modal-piece-id">ID: ' + piece.id + '</div>';
  document.getElementById('modalContent').innerHTML =
    '<div class="modal-img-wrap">'
    + '<button class="modal-img-back" onclick="closeModal()">&#x2190; Back</button>'
    + '<img src="' + imgUrl + '" alt="' + piece.name + '" />'
    + '</div>'
    + '<div class="modal-piece-info">' +
      '<div class="modal-piece-name">' + piece.name + '</div>' +
      (piece.sat ? '<div>Sat: ' + piece.sat + '</div>' : '') +
      idHtml +
    '</div>';
  document.getElementById('pieceModal').classList.add('open');
  // Soften music to half volume while viewing piece
  if (bgMusic) fadeVolume(0.5, 500);
}

function toggleModalTip() {
  var tip = document.getElementById('modal-tip');
  if (tip) tip.style.display = tip.style.display === 'flex' ? 'none' : 'flex';
}

function toggleTip(id) {
  var tip = document.getElementById('tip-' + id);
  if (tip) tip.style.display = tip.style.display === 'flex' ? 'none' : 'flex';
}

function closeModal() {
  document.getElementById('pieceModal').classList.remove('open');
  document.getElementById('modalContent').innerHTML = '';
  // Restore music volume to full when piece viewer closes
  if (bgMusic) fadeVolume(1.0, 500);
}

// ============================================================
// LANDING TRANSITION
// Click GIF → zoom fills screen → fade to black → gallery
// ============================================================
var entered = false;
var landingTimer = null;

function enterSite() {
  if (entered) return;
  entered = true;
  if (landingTimer) clearTimeout(landingTimer);
  console.log('enterSite running');

  var landing = document.getElementById('landing');
  var mainWrapper = document.getElementById('main-wrapper');

  // Fade out landing gently
  if (landing) landing.style.transition = 'opacity 1.5s ease';
  if (landing) landing.style.opacity = '0';

  // Show gallery after landing fades — soft fade in
  setTimeout(function() {
    console.log('showing gallery now');
    if (landing) landing.style.display = 'none';
    if (mainWrapper) {
      mainWrapper.style.display = 'block';
      mainWrapper.style.transition = 'opacity 1.2s ease';
      mainWrapper.style.opacity = '1';
    }
    document.body.classList.remove('landing-open');
    showHome();
    // Soft music fade in
    if (bgMusic) fadeInMusic(1.0, 3000);
    console.log('gallery shown, mainContent:', document.getElementById('mainContent').innerHTML.length, 'chars');
  }, 1600);
}

document.addEventListener('keydown', function(e) {
  if (!entered && (e.key === 'Enter' || e.key === ' ')) {
    enterSite();
  }
});

// Click handlers — attached after function is defined
document.getElementById('landing').addEventListener('click', function() {
  if (!entered) enterSite();
});
document.getElementById('landing-gif-wrap').addEventListener('click', function(e) {
  e.stopPropagation();
  if (!entered) enterSite();
});

// Force clean state for every fresh page load
entered = false;
landingTimer = null;
startLandingTimer();

// ============================================================
// EEGUN INSCRIPTION TOOLTIPS
// ============================================================
function showTip(id) {
  var tip = document.getElementById('tip-' + id);
  if (tip) tip.style.display = 'flex';
}

function hideTip(id) {
  var tip = document.getElementById('tip-' + id);
  if (tip) tip.style.display = 'none';
}
</script>
