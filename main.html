// ============================================================
// RENDER FUNCTIONS
// ============================================================

function renderArtThumbs(col) {
  // Banner collections (seed2flower, ftw, bannerz) use their art array as-is
  if (col.type === 'banner' && col.art && col.art.length > 0) {
    return col.art.map(function(url) {
      var proxied = url.replace('https://ordinals.com/content/', '/proxy/');
      return '<div class="art-thumb"><img src="' + proxied + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.art-thumb-placeholder\')&&(this.parentElement.querySelector(\'.art-thumb-placeholder\').style.display=\'flex\')" /><div class="art-thumb-placeholder" style="display:none">OG BE</div></div>';
    }).join('');
  }

  // Non-banner collections: show first 4 pieces in a 2x2 grid
  if (col.pieces && col.pieces.length > 0) {
    var displayPieces = col.pieces.slice(0, 4);
    return displayPieces.map(function(p) {
      var imgUrl = '/proxy/' + p.id;
      return '<div class="art-thumb"><img src="' + imgUrl + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.parentElement.querySelector(\'.art-thumb-placeholder\')&&(this.parentElement.querySelector(\'.art-thumb-placeholder\').style.display=\'flex\')" /><div class="art-thumb-placeholder" style="display:none">OG BE</div></div>';
    }).join('');
  }

  // Fallback: collection name
  return '<div class="art-thumb" style="display:flex;align-items:center;justify-content:center;background:var(--panel);"><span style="font-size:11px;color:var(--text-muted);letter-spacing:0.2em;text-transform:uppercase;">' + col.name + '</span></div>';
}

function renderHome() {
  var hero = '';
  var collectionsHtml = COLLECTIONS.map(function(col) {
    var tags = col.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
    return ''
      + '<a href="#" class="collection-card' + (col.type ? ' collection-card-' + col.type : '') + '" onclick="showCollection(\'' + col.id + '\'); return false;">'
      + '<div class="collection-card-art">' + renderArtThumbs(col) + '</div>'
      + '<div class="collection-card-info">'
      + '<div class="collection-card-name">' + col.name + '</div>'
      + '<div class="collection-card-meta"><span>' + col.count + ' pieces</span></div>'
      + '<div class="collection-card-desc">' + col.descShort + '</div>'
      + '</div>'
      + '<div class="collection-card-arrow">&#x2192;</div>'
      + '</a>';
  }).join('');

  return ''
    + '<div class="section"><div class="container">'
    + '<div class="section-header">'
    + '<h2 class="section-title">Collections</h2>'
    + '</div>'
    + '<div class="collections-grid">'
    + collectionsHtml
    + '</div>'
    + '</div></div>';
}

function renderCollection(colId) {
  var col = COLLECTIONS.find(function(c) { return c.id === colId; });
  if (!col) return '<p>Collection not found.</p>';

  var tags = col.tags.map(function(t) { return '<span class="tag">' + t + '</span>'; }).join('');
  var artHtml = '';
  if (col.art && col.art.length > 0) {
    artHtml = '<div class="collection-art">' + col.art.map(function(url) {
      var proxied = url.replace('https://ordinals.com/content/', '/proxy/');
      return '<img src="' + proxied + '" alt="" loading="lazy" style="width:100%;height:auto;display:block;" />';
    }).join('') + '</div>';
  }

  var piecesHtml = col.pieces.map(function(p) {
    var imgUrl = '/proxy/' + p.id;
    var satHtml = p.sat ? '<div class="piece-card-sat">Sat: ' + p.sat + '</div>' : '';
    return ''
      + '<a href="https://ordinals.com/content/' + p.id + '" target="_blank" rel="noopener" class="piece-card">'
      + '<div class="piece-card-img"><img src="' + imgUrl + '" alt="' + p.name + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=piece-card-placeholder>OG BE</div>\'" /></div>'
      + '<div class="piece-card-info">'
      + '<div class="piece-card-name">' + p.name + '</div>'
      + '<div class="piece-card-id">' + p.id.substring(0, 12) + '...</div>'
      + satHtml
      + '</div>'
      + '</a>';
  }).join('');

  return ''
    + '<div class="section"><div class="container">'
    + '<div class="back-link"><a href="#" onclick="showHome(); return false;">&#x2190; Collections</a></div>'
    + '<div class="collection-header">'
    + '<div>'
    + '<h1 class="collection-title">' + col.name + '</h1>'
    + '<div class="collection-meta">' + col.count + ' pieces &middot; ' + tags + '</div>'
    + '</div>'
    + '</div>'
    + '<p class="collection-desc">' + col.desc + '</p>'
    + artHtml
    + '<div class="pieces-grid">'
    + piecesHtml
    + '</div>'
    + '</div></div>';
}

function renderUpcoming() {
  return ''
    + '<div class="section"><div class="container">'
    + '<div class="section-header">'
    + '<h2 class="section-title">Upcoming</h2>'
    + '</div>'
    + '<p class="section-desc">New collections and drops from OG BE are in the works. Follow <a href="https://twitter.com/_0gbe" target="_blank" rel="noopener" style="color:var(--text);text-decoration:underline">@_0gbe</a> on X for announcements.</p>'
    + '</div></div>'
    + '<div class="notify-bar">'
    + '<div class="container">'
    + '<p class="notify-label">Stay Updated</p>'
    + '<p class="notify-title">Get notified when new work drops</p>'
    + '<form class="notify-form" onsubmit="event.preventDefault(); this.querySelector(\'button\').textContent=\'You\\'re in\'; this.querySelector(\'input\').disabled=true;">'
    + '<input type="email" placeholder="your@email.com" required />'
    + '<button type="submit">Notify Me</button>'
    + '</form>'
    + '</div>'
    + '</div>';
}

// ============================================================
// NAVIGATION
// ============================================================
function showHome() {
  document.getElementById('mainContent').innerHTML = renderHome();
  document.getElementById('navCollections').classList.add('active');
  document.getElementById('navUpcoming').classList.remove('active');
  window.scrollTo(0, 0);
}

function showUpcoming() {
  document.getElementById('mainContent').innerHTML = renderUpcoming();
  document.getElementById('navCollections').classList.remove('active');
  document.getElementById('navUpcoming').classList.add('active');
  window.scrollTo(0, 0);
}

function showCollection(id) {
  document.getElementById('mainContent').innerHTML = renderCollection(id);
  window.scrollTo(0, 0);
}

function toggleNav() {
  document.getElementById('siteNav').classList.toggle('open');
}

function closeModal() {
  document.getElementById('pieceModal').classList.remove('open');
  document.getElementById('modalContent').innerHTML = '';
}

// INIT

showHome();
